<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DROP 001 — BRBL</title>
<meta name="description" content="BRBL clothing. First drop coming. Built for the iron."/>
<meta name="theme-color" content="#171615"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23171615'/%3E%3Ccircle cx='32' cy='32' r='25' fill='%23e2dbcc'/%3E%3Ccircle cx='32' cy='32' r='21' fill='none' stroke='%239e988c' stroke-width='1.5'/%3E%3Ccircle cx='32' cy='32' r='7.5' fill='%23d8dadd'/%3E%3Ccircle cx='32' cy='32' r='2.8' fill='%23262a2d'/%3E%3C/svg%3E"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap');
:root{--char:#171615;--bone:#e6dfd0;--dim:#a39d8e;--faint:#6d675c;--line:rgba(230,223,208,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--char);color:var(--bone);font-family:'Barlow',sans-serif;min-height:100svh;display:flex;flex-direction:column}
nav{border-bottom:1px solid var(--line)}
nav .in{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
.mark{font-family:'Barlow Condensed';font-weight:800;font-size:22px;letter-spacing:.28em;text-decoration:none;color:var(--bone)}
nav a.back{font-size:14px;color:var(--dim);text-decoration:none}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px}
.stamp{font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:.4em;color:var(--faint);border:1px solid var(--line);border-radius:999px;padding:8px 22px;margin-bottom:34px}
h1{font-family:'Barlow Condensed';font-weight:800;font-size:clamp(56px,11vw,120px);letter-spacing:.1em;line-height:.95}
.sub{font-family:'Barlow Condensed';font-weight:700;font-size:clamp(15px,2.4vw,20px);letter-spacing:.32em;text-transform:uppercase;color:var(--dim);margin:16px 0 44px}
.copy{color:var(--dim);max-width:420px;line-height:1.7;margin-bottom:36px}
form{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
input{background:transparent;border:1px solid var(--line);border-radius:999px;color:var(--bone);font-family:'Barlow';font-size:15px;padding:14px 22px;width:min(300px,78vw);outline:none}
input:focus{border-color:var(--dim)}
button{font-family:'Barlow Condensed';font-weight:700;font-size:16px;letter-spacing:.08em;text-transform:uppercase;background:var(--bone);color:var(--char);border:none;border-radius:999px;padding:14px 30px;cursor:pointer}
footer{border-top:1px solid var(--line);padding:26px 24px;text-align:center;font-size:13px;color:var(--faint)}
@media(prefers-reduced-motion:no-preference){
  h1{animation:rise .8s ease-out both}.sub{animation:rise .8s .12s ease-out both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
}
</style>
</head>
<body>
<nav><div class="in"><a class="mark" href="/">BRBL</a><a class="back" href="/">&larr; brbl.app</a></div></nav>
<main>
  <div class="stamp">CLOTHING</div>
  <h1>DROP 001</h1>
  <p class="sub">Built for the iron · Coming soon</p>
  <p class="copy">Heavyweight tees and hoods, embroidered with the plate. Small runs, numbered pieces. The list gets first access — and drops sell out.</p>
  <!-- FormSubmit: replace YOUR-EMAIL-HERE with your real email (same as homepage form) -->
  <form action="https://formsubmit.co/douggscott99@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="BRBL DROP 001 list"/>
    <input type="hidden" name="_captcha" value="false"/>
    <input type="email" name="email" placeholder="your@email.com" required/>
    <button type="submit">First access</button>
  </form>
</main>
<footer>© 2026 BRBL · Made in Scotland</footer>
</body>
</html>

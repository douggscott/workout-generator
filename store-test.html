:root{--char:#171615;--bone:#e6dfd0;--dim:#a39d8e;--faint:#6d675c;--line:rgba(230,223,208,.12)}

.brbl-price{font-size:18px;margin:0 0 16px;color:var(--dim)}
.brbl-sizes{display:flex;flex-wrap:wrap;gap:8px}
.brbl-add-to-cart{padding:10px 16px;background:var(--bone);color:var(--char);border:none;border-radius:4px;font-family:'Barlow Condensed';font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
